<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>サインイン</title>
  <link href="../lib/css/onepg-base.css" rel="stylesheet">
  <style>
    .item-head {
      width: 8rem;
    }
  </style>
</head>
<body>
  <header>
    <div>サインイン</div>
    <!-- メッセージ表示 -->
    <section id="_msg"></section>
  </header>
  <main>
    <section>
      <!-- ID -->
      <div class="grid-row">
        <div class="grid-col-12">
          <div class="item-head">
            <label for="signinId">ユーザーID</label>
          </div><!-- /.item-head -->
          <div class="item-body">
            <input type="text" name="signin_id" id="signinId" style="width: 14rem;">
          </div><!-- /.item-body -->
        </div><!-- /.grid-col-* -->
      </div><!-- /.grid-row -->

      <!-- パスワード -->
      <div class="grid-row">
        <div class="grid-col-12">
          <div class="item-head">
            <label for="signinPw">パスワード</label>
          </div><!-- /.item-head -->
          <div class="item-body">
            <input type="password" name="signin_pw" id="signinPw" style="width: 14rem;">
          </div><!-- /.item-body -->
        </div><!-- /.grid-col-* -->
      </div><!-- /.grid-row -->

      <!-- デバッグモード -->
      <div class="grid-row">
        <div class="grid-col-12">
          <div class="item-head"></div><!-- /.item-head -->
          <div class="item-body">
            <label>
              <input type="checkbox" name="signin_debug" value="1">
              デバッグモード（認証失敗時にサーバーログへエラー詳細を出力する）
            </label>
          </div><!-- /.item-body -->
        </div><!-- /.grid-col-* -->
      </div><!-- /.grid-row -->

      <!-- ボタン -->
      <div class="grid-row">
        <div class="grid-col-12">
          <div class="item-head"></div><!-- /.item-head -->
          <div class="item-body">
            <button type="button" onclick="signin()">サインイン</button>
          </div><!-- /.item-body -->
        </div><!-- /.grid-col-* -->
      </div><!-- /.grid-row -->
    </section>
  </main>
  
  <footer>
    <div>©サンプル</div>
  </footer>

  <script src="../lib/js/onepg-utils.js" defer></script>
  <script src="index.js" defer></script>
</body>
</html>
